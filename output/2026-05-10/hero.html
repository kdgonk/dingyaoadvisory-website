<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Noto Sans TC", sans-serif;
  overflow: hidden;
  position: relative;
}
.container {
  width: 100%;
  height: 100%;
  display: flex;
  background: linear-gradient(135deg, #0A1628 0%, #1E3A5F 50%, #D4AF37 100%);
  position: relative;
}
.left-side {
  width: 55%;
  height: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 40px 50px;
}
.mountain-silhouette {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 280px;
  background: linear-gradient(to top, #0A1628 0%, transparent 100%);
}
.mountain-shape {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 200px;
  background: linear-gradient(135deg, #152438 0%, #1E3A5F 100%);
  clip-path: polygon(0% 100%, 15% 60%, 25% 75%, 35% 45%, 50% 70%, 60% 40%, 75% 55%, 85% 35%, 100% 60%, 100% 100%);
}
.coastline {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: linear-gradient(90deg, #1E3A5F 0%, #2C5282 50%, #D4AF37 100%);
  opacity: 0.8;
}
.right-side {
  width: 45%;
  height: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px;
  background: linear-gradient(180deg, rgba(212, 175, 55, 0.3) 0%, rgba(10, 22, 40, 0.9) 100%);
}
.gold-flow {
  position: absolute;
  top: 0;
  left: -100px;
  width: 150px;
  height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(212, 175, 55, 0.6) 50%, rgba(255, 107, 53, 0.4) 100%);
  filter: blur(30px);
  transform: skewX(-15deg);
}
.headline {
  font-size: 38px;
  font-weight: 700;
  color: #FFFFFF;
  line-height: 1.3;
  margin-bottom: 16px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  z-index: 10;
}
.subheadline {
  font-size: 20px;
  font-weight: 400;
  color: #D4AF37;
  line-height: 1.5;
  z-index: 10;
}
.investor-icons {
  display: flex;
  gap: 20px;
  margin-top: 30px;
  z-index: 10;
}
.icon-circle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 2px solid #D4AF37;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.globe {
  position: absolute;
  top: 60px;
  right: 60px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(212, 175, 55, 0.8), rgba(30, 58, 95, 0.6));
  border: 3px solid #D4AF37;
  opacity: 0.6;
}
.globe::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 2px;
  background: rgba(212, 175, 55, 0.5);
}
.globe::after {
  content: '';
  position: absolute;
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  background: rgba(212, 175, 55, 0.5);
}
.wealth-symbols {
  position: absolute;
  bottom: 100px;
  right: 40px;
  font-size: 32px;
  color: #D4AF37;
  opacity: 0.8;
  z-index: 10;
}
.sunset-glow {
  position: absolute;
  top: -50px;
  right: -50px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255, 107, 53, 0.5) 0%, rgba(212, 175, 55, 0.3) 40%, transparent 70%);
  filter: blur(40px);
}
.data-streams {
  position: absolute;
  top: 40%;
  left: 30%;
  width: 40%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #D4AF37, transparent);
  opacity: 0.6;
}
.data-streams::after {
  content: '';
  position: absolute;
  top: 20px;
  left: 10%;
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #FF6B35, transparent);
  opacity: 0.5;
}
</style>
</head>
<body>
<div class="container">
  <div class="sunset-glow"></div>
  <div class="left-side">
    <div class="mountain-shape"></div>
    <div class="coastline"></div>
    <div class="mountain-silhouette"></div>
    <div class="data-streams"></div>
  </div>
  <div class="gold-flow"></div>
  <div class="right-side">
    <div class="globe"></div>
    <div class="headline">Western Cape Property:<br>Where Lifestyle Meets<br>Investment Returns</div>
    <div class="subheadline">西開普省房產：生活方式與投資報酬的完美交會</div>
    <div class="wealth-symbols">$ € ¥ £</div>
    <div class="investor-icons">
      <div class="icon-circle">👥</div>
      <div class="icon-circle">📈</div>
      <div class="icon-circle">🏠</div>
    </div>
  </div>
</div>
</body>
</html>
